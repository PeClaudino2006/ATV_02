<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Compras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="header-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.5 6h13M7 13L5.4 5M10 21a1 1 0 100-2 1 1 0 000 2zm7 0a1 1 0 100-2 1 1 0 000 2z"/>
        </svg>
      </div>
      <div>
        <h1 class="header-title">Lista de Compras</h1>
        <p class="header-subtitle">Gerencie seus produtos</p>
      </div>
    </header>

    <div class="card">
      <h2 class="section-title">Adicionar Produto</h2>
      <div class="form-row">
        <div class="input-group">
          <label for="name">Nome do produto</label>
          <input type="text" id="name" placeholder="Ex: Chocolate Milka">
        </div>
        <div class="input-group">
          <label for="price">Valor (R$)</label>
          <input type="number" id="price" placeholder="Ex: 15.00" step="0.01" min="0">
        </div>
        <button class="btn btn-primary" onclick="addItem()">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
          Adicionar
        </button>
      </div>
      <p id="form-error" class="form-error"></p>
    </div>

    <div class="card">
      <div class="list-header">
        <h2 class="section-title">Produtos</h2>
        <span class="badge" id="count">0 itens</span>
      </div>
      <ul id="list">
        <li class="empty-state">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="#ccc" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
          <p>Nenhum produto cadastrado</p>
        </li>
      </ul>
    </div>

  </div>

  <!-- Modal de edição -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h2 class="modal-title">Editar Produto</h2>
      <div class="input-group">
        <label for="edit-name">Nome do produto</label>
        <input type="text" id="edit-name" placeholder="Nome do produto">
      </div>
      <div class="input-group" style="margin-top: 12px;">
        <label for="edit-price">Valor (R$)</label>
        <input type="number" id="edit-price" placeholder="Valor" step="0.01" min="0">
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmEdit()">Salvar</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
